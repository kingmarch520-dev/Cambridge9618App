name: Android Buildozer Compilation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libltdl-dev

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer Engine
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Auto-Accept Android SDK Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        # Dynamically download the sdkmanager and auto-accept terms
        yes | pip install --upgrade android-sdk-updater || true
        # Tell buildozer explicitly to accept licenses globally
        export BUILDOZER_ALLOW_ORG_APK_DOMAIN=1

    - name: Compile Standalone Android APK
      run: |
        # Using the special accept-licenses flag natively supported by buildozer
        yes | buildozer android debug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cambridge-9618-App
        path: bin/*.apk
